<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports</title>
<style>
  :root {
    --bg: #fafaf7;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e5e3dc;
    --accent: #1a1a1a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard",
                 "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  header h1 {
    margin: 0 0 8px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .item {
    border-bottom: 1px solid var(--line);
  }
  .item a {
    display: block;
    padding: 24px 0;
    color: inherit;
    text-decoration: none;
    transition: opacity 0.15s ease;
  }
  .item a:hover {
    opacity: 0.6;
  }
  .item time {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .item h2 {
    margin: 0 0 6px;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .item .desc {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
  }
  .empty {
    padding: 48px 0;
    text-align: center;
    color: var(--muted);
  }
  footer {
    margin-top: 48px;
    font-size: 12px;
    color: var(--muted);
  }
  @media (max-width: 480px) {
    .wrap { padding: 40px 20px 64px; }
    header h1 { font-size: 24px; }
    .item h2 { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Reports</h1>
      <p>총 0개의 문서</p>
    </header>
    <ul>
      <li class="empty">아직 등록된 문서가 없습니다.</li>
    </ul>
    <footer>Last updated: 2026-04-18</footer>
  </div>
</body>
</html>
